<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Hệ thống Thuê Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar { min-height: 100vh; background: #212529; color: white; }
        .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover { background: #343a40; color: white; }
        .sidebar a.active { background: #0d6efd; color: white; }
        .stat-card { border: none; border-left: 4px solid #0d6efd; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar px-0">
            <div class="p-3 text-center">
                <h4>CAR RENTAL</h4>
                <hr>
            </div>
            <a href="{% url 'rentals:dashboard_home' %}" class="active"><i class="fas fa-chart-line me-2"></i> Tổng quan</a>
            <a href="{% url 'rentals:dashboard_car_list' %}"><i class="fas fa-car me-2"></i> Quản lý Xe</a>
            <a href="#"><i class="fas fa-building me-2"></i> Nhà cung cấp</a>
            <a href="#"><i class="fas fa-map-marker-alt me-2"></i> Địa điểm</a>
            <a href="#"><i class="fas fa-file-invoice me-2"></i> Đơn đặt xe</a>
            <hr>
            <a href="/admin/logout/"><i class="fas fa-sign-out-alt me-2"></i> Đăng xuất</a>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 bg-light">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Bảng điều khiển quản trị</h1>
            </div>

            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card stat-card p-3">
                        <div class="text-muted small uppercase">Tổng số xe</div>
                        <div class="h3 font-weight-bold">{{ total_cars }}</div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card stat-card p-3" style="border-left-color: #198754;">
                        <div class="text-muted small uppercase">Xe sẵn sàng</div>
                        <div class="h3 font-weight-bold text-success">{{ available_cars }}</div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card stat-card p-3" style="border-left-color: #0dcaf0;">
                        <div class="text-muted small uppercase">Nhà cung cấp</div>
                        <div class="h3 font-weight-bold text-info">{{ total_suppliers }}</div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mt-4">
                <div class="card-body">
                    <h5 class="card-title">Thông báo hệ thống</h5>
                    <p class="card-text text-muted">Chào mừng bạn trở lại! Hệ thống hiện đang hoạt động ổn định.</p>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
