<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuê Xe Tự Lái - Trang Chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">CAR RENTAL</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'rentals:dashboard_home' %}">Trang Quản Trị (Admin)</a>
            </div>
        </div>
    </nav>

    <header class="bg-primary text-white text-center py-5">
        <div class="container">
            <h1>Chào mừng đến với Hệ thống Thuê xe</h1>
            <p class="lead">Tìm kiếm chiếc xe hoàn hảo cho chuyến đi của bạn</p>
        </div>
    </header>

    <div class="container my-5">
        <h2 class="text-center mb-4">Xe Sẵn Có</h2>
        <div class="row">
            {% for car in cars %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ car.brand }} {{ car.name }}</h5>
                        <p class="card-text text-muted">{{ car.type }}</p>
                        <p class="fw-bold text-primary">{{ car.base_price }}đ / ngày</p>
                        <button class="btn btn-outline-primary w-100">Xem Chi Tiết</button>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <p>Hiện tại chưa có xe nào được đăng tải.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
